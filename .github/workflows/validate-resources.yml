name: Validate resources

on:
  push:
    branches: [main]
    paths:
      - 'src/main/resources/**'
      - 'src/test/java/**/ResourceYamlValidationUnitTest.java'
  pull_request:
    branches: [main]
    paths:
      - 'src/main/resources/**'
      - 'src/test/java/**/ResourceYamlValidationUnitTest.java'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build and install MockBukkit d245e0a
        run: |
          git clone https://github.com/MockBukkit/MockBukkit.git /tmp/MockBukkit
          cd /tmp/MockBukkit && git checkout d245e0a && ./gradlew publishToMavenLocal -xtest -xjavadoc

      - name: Run resource YAML validation
        run: ./mvnw -B test -Dtest=ResourceYamlValidationUnitTest
