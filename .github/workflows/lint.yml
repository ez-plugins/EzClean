name: Lint

on:
  pull_request:
    branches: [main]
    paths:
      - 'docs/**/*.md'
      - '.markdownlint.yml'
      - '.markdownlintignore'

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: 'docs/**/*.md'
          config: '.markdownlint.yml'
