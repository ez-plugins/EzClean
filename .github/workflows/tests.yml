name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build and install MockBukkit d245e0a
        run: |
          git clone https://github.com/MockBukkit/MockBukkit.git /tmp/MockBukkit
          cd /tmp/MockBukkit && git checkout d245e0a && ./gradlew publishToMavenLocal -xtest -xjavadoc

      - name: Run tests
        run: ./mvnw -B test

      - name: Upload surefire reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
