title: EzClean
description: Automated entity cleanup for Paper servers — keep your worlds tidy with minimal TPS impact.
baseurl: "/ezclean"
url: "https://ez-plugins.github.io"

theme: just-the-docs

# Navigation order for top-level pages
nav_sort: case_insensitive

# Colour scheme
color_scheme: dark

# Enable search
search_enabled: true
search:
  heading_level: 3
  previews: 3

# Auxiliary links in the top-right corner
aux_links:
  "GitHub":
    - "https://github.com/ez-plugins/ezclean"
  "SpigotMC":
    - "https://www.spigotmc.org/resources/ezclean.129782/"

aux_links_new_tab: true

# Footer content
footer_content: >
  EzClean is open source under the
  <a href="https://github.com/ez-plugins/ezclean/blob/main/LICENSE">MIT License</a>.

# Callouts
callouts:
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: yellow
  important:
    title: Important
    color: red
  tip:
    title: Tip
    color: green

# GitHub edit links
gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/ez-plugins/ezclean"
gh_edit_branch: "main"
gh_edit_source: docs
gh_edit_view_mode: "edit"

# Exclude from Jekyll processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
