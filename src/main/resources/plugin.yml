name: EzClean
version: ${project.version}
main: com.skyblockexp.ezclean.EzCleanPlugin
description: Keep your worlds tidy with automated cleanup of stray entities.
api-version: 26.1
folia-supported: true
softdepend: [WorldGuard, Vault, EzCountdown, PlaceholderAPI, spark]
libraries:
  - net.kyori:adventure-api:4.26.1
  - net.kyori:adventure-key:4.26.1
  - net.kyori:examination-api:1.3.0
  - net.kyori:adventure-text-minimessage:4.26.1
  - net.kyori:adventure-text-serializer-legacy:4.26.1
  - org.xerial:sqlite-jdbc:3.49.1.0
  - org.slf4j:slf4j-api:1.7.36
  - ch.qos.logback:logback-classic:1.2.12
commands:
  ezclean:
    description: Manage EzClean cleaners.
    usage: /<command> [setup | run [id] | cancel [id] | reload | time [id] | toggle <feature> [id] | usage [plugin] | stats [id] | help]
    aliases: [clean]
permissions:
  ezclean.clean:
    description: Allows triggering EzClean cleanup profiles on demand.
    default: op
  ezclean.reload:
    description: Allows reloading the EzClean configuration.
    default: op
  ezclean.status:
    description: Allows checking the time remaining for EzClean cleanup profiles.
    default: op
  ezclean.usage:
    description: Allows inspecting scheduler usage per plugin.
    default: op
  ezclean.stats:
    description: Allows viewing cleanup stats snapshots.
    default: op
  ezclean.cancel:
    description: Allows players to pay to cancel upcoming cleanup cycles.
    default: true
  ezclean.toggle:
    description: Allows admins to toggle EzClean features in-game.
    default: op
  ezclean.deathchest.limit.bypass:
    description: Bypasses the per-player death chest limit.
    default: op
  ezclean.setup:
    description: Allows admins to open the EzClean setup GUI.
    default: op
  ezclean.help:
    description: Allows viewing EzClean command help.
    default: op
