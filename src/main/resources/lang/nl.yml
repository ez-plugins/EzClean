  # /ezclean usage (planner-monitor)
  scheduler:
    stop-players-only: "Alleen spelers kunnen de live gebruiksmonitor stoppen."
    stopped: "Live asynchrone gebruiksmonitor gestopt."
    no-monitor: "Je hebt momenteel geen actieve live gebruiksmonitor."
    live-players-only: "Alleen spelers kunnen de live gebruiksmonitor bekijken."
    no-activity: "Geen planneractiveiteit gedetecteerd."
    no-activity-plugin: "Geen planneractiveiteit gevonden voor plugin \"{name}\"."
    tip: "Tip: Gebruik /{label} usage live{suffix} voor een live asynchroon overzicht. Gebruik /{label} usage stop om te annuleren."
    started: "Live asynchrone gebruiksmonitor gestart{suffix}. Gebruik /{label} usage stop om te annuleren."
    live-hint: "Live samenvatting verschijnt in je actiebalk. Chat-updates verschijnen bij significante wijzigingen."
    header-live: "Live asynchroon planneroverzicht"
    header-static: "Planneroverzicht"
    no-activity-filter: "Geen planneractiveiteit die overeenkomt met het filter."
    stop-live: "Gebruik /{label} usage stop om de live weergave te annuleren."
    more-plugins-s: "\u2026 plus {n} plugin meer."
    more-plugins-p: "\u2026 plus {n} plugins meer."
  # /ezclean setup
  setup:
    players-only: "De setup-GUI kan alleen worden geopend door een speler."
# ── Update-melding ───────────────────────────────────────────────────────────
update:
  available: "EzClean-update beschikbaar: v{version}. "
  download: "[Downloaden]"

# ── Standaard uitzendberichtinhoud ───────────────────────────────────────────
# MiniMessage-opmaak; placeholders gebruik {name}-stijl.
defaults:
  warning:
    message: "<yellow>\u26a0 Entiteitsopruiming over <gold>{minutes}</gold> minuten. Ruim waardevolle spullen op!</yellow>"
  broadcast:
    start:
      message: "<red><bold>\u2726 Entiteitsopruiming begint nu...</bold></red>"
    summary:
      message: "<gray>\u2713 <gold>{count}</gold> entiteiten verwijderd. Volgende opruiming over <gold>{minutes}</gold> minuten.</gray>"
    pre-clean:
      message: ""
    interval:
      message: "<yellow>\u26a0 Entiteitsopruiming over <gold>{minutes}</gold> minuten. Ruim waardevolle spullen op!</yellow>"
    dynamic:
      message: "<yellow>\u26a0 Entiteitsopruiming over <gold>{minutes}</gold> minuten. Ruim waardevolle spullen op!</yellow>"
  stats-summary:
    message: "<gray>Opruimingsstatistieken voor <aqua>{cleaner}</aqua>: <gold>{runs}</gold> keer uitgevoerd, <gold>{total_removed}</gold> verwijderd. Gem. duur: <gold>{avg_duration}</gold>. Gem. TPS-impact: <gold>{avg_tps_impact}</gold>. Topgroepen: {top_groups}. Topwerelden: {top_worlds}.</gray>"
  cancel:
    hover-message: "<yellow>Klik om <gold>{cost}</gold> te betalen en deze opruiming te annuleren.</yellow>"
    success-message: "<green>Je hebt <gold>{cost}</gold> betaald om de <aqua>{cleaner}</aqua>-opruiming te annuleren.</green>"
    broadcast-message: "<gold>{player}</gold> heeft de <aqua>{cleaner}</aqua>-opruiming geannuleerd. Volgende opruiming over <yellow>{minutes}</yellow> minuten."
    insufficient-funds-message: "<red>Je hebt <gold>{cost}</gold> nodig om de opruiming te annuleren.</red>"
    disabled-message: "<red>Deze opruiming kan niet worden geannuleerd.</red>"
    no-economy-message: "<red>Economie is niet beschikbaar. Opruiming kan niet worden geannuleerd.</red>"
