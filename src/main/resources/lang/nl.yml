    result: "Opruiming voor \"{id}\" start over {duration}."
    no-match: "Geen opruimingsprofiel gevonden voor \"{id}\"."

  # /ezclean run
  run:
    multiple: "Meerdere opruimingsprofielen beschikbaar. Geef er één op: {ids}"
    no-match: "Geen opruimingsprofiel gevonden voor \"{id}\"."
    available: " Beschikbaar: "
    idle: "\"{id}\" is momenteel niet gepland."
    triggered: "Opruiming gestart voor \"{id}\"."

  # /ezclean reload
  reload:
    success: "Configuratie herladen."
    loaded-prefix: " Geladen: "
    profile-single: "1 profiel"
    profiles-plural: "{n} profielen"
    colon: ": "
    none: "geen"

  # /ezclean stats
  stats:
    header: "Opruimingsstatistieken voor "
    multiple: "Meerdere profielen beschikbaar. Geef er één op: "
    no-match: "Geen opruimingsprofiel gevonden voor \"{id}\"."
    no-stats: "Nog geen opruimingsstatistieken opgeslagen voor \"{id}\"."
    row-total-runs: "Totaal uitgevoerd"
    row-total-removed: "Totaal verwijderd"
    row-avg-duration: "Gem. duur"
    row-avg-tps: "Gem. TPS-impact"
    top-groups: "  Topentiteitsgroepen:"
    top-worlds: "  Topwerelden:"
    last-run: "Laatste uitvoering"
    last-removed: "  Verwijderd"
    last-duration: "  Duur"
    last-tps: "  TPS-impact"
    last-groups: "    Groepen:"
    last-worlds: "    Werelden:"

  # /ezclean toggle
  toggle:
    unknown-feature: "Onbekende functie \"{name}\"."
    cleaner-features: "  Opruimerfuncties: "
    global-features: "  Algemene functies: "
    no-match: "Geen opruimerprofiel gevonden voor \"{id}\"."
    available: " Beschikbaar: "
    multiple: "Meerdere opruimerprofielen geconfigureerd. Geef er één op: "
    no-file: "Geen configuratiebestand gevonden voor opruimer \"{id}\"."
    save-failed: "Opslaan van configuratie voor opruimer \"{id}\" mislukt: {error}"
    save-failed-global: "Opslaan van configuratie mislukt: {error}"
    no-global-file: "Configuratiebestand voor functie \"{name}\" kan niet worden gevonden."
    no-global-file-missing: "Configuratiebestand voor \"{name}\" niet gevonden. Start de server eenmalig om het te genereren."
    on: "AAN"
    off: "UIT"

  # /ezclean cancel
  cancel:
    players-only: "Alleen spelers kunnen opruimingscycli annuleren."
    multiple: "Meerdere profielen beschikbaar. Geef er één op: "
    available-label: "Beschikbaar: "
    no-match: "Geen profiel gevonden voor \"{id}\". "
    no-match-simple: "Geen opruimingsprofiel gevonden voor \"{id}\"."
