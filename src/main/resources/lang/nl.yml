# EzClean — Nederlands taalbestand (nl)

# ── Tijdopmaak ──────────────────────────────────────────────────────────────
format:
  duration:
    instant: "minder dan een minuut"
    hour-s: "uur"
    hour-p: "uur"
    minute-s: "minuut"
    minute-p: "minuten"
    second-s: "seconde"
    second-p: "seconden"
    joiner: " en "
  not-available: "N/B"
  entries:
    none: "Geen"
    more: "+{n} meer"
    removed: "verwijderd"

# ── Commandoberichten ────────────────────────────────────────────────────────
command:
  no-profiles: "Er zijn momenteel geen opruimingsprofielen geconfigureerd."
  no-permission: "Je hebt geen toestemming om dit commando te gebruiken."
  unknown-subcommand: "Onbekend subcommando \"{name}\". Gebruik /{label} help voor beschikbare commando's."

  # /ezclean (hoofdgebruik)
  main:
    subtitle: "Geautomatiseerde entiteitsopruiming voor Minecraft-servers"
    quick-commands: "Snelle commando's:"
    footer: "Gebruik /{label} help voor alle beschikbare commando's."
    cmd-help: "Gedetailleerde commandohulp weergeven"
    cmd-run: "Opruiming handmatig starten"
    cmd-time: "Tijd tot volgende opruiming controleren"
    cmd-stats: "Opruimingsstatistieken bekijken"

  # /ezclean help
  help:
    title: "Commandoreferentie"
    section-player: "Spelerscommando's"
    section-admin: "Beheerderscommando's"
    hover-fill: "Klik om commando in te vullen"
    id-note: "[id] = profiel-ID van de opruimer. Weglaten als er slechts één profiel is."
    cmd-time: "Tijd tot volgende opruiming"
    cmd-cancel: "Aankomende opruiming uitstellen"
    cmd-stats: "Opruimingsstatistieken bekijken"
    cmd-help: "Dit bericht weergeven"
    cmd-run: "Een opruimingscyclus nu starten"
    cmd-reload: "Plugin-configuratie herladen"
    cmd-setup: "Interactieve setup-GUI openen"
    cmd-toggle: "Een functie aan/uitzetten"
    cmd-usage: "Plannertaken inspecteren"

  # /ezclean time
  time:
    header: "Opruimingstimers"
    not-scheduled: "niet gepland"
