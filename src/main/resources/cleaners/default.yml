# Default EzClean cleaner profile. Duplicate this file and adjust the values to create
# additional cleanup schedules (e.g. nether.yml, end.yml).
interval-minutes: 60

# Minimum number of players that must be online globally for cleanup to run.
# Set to 0 (default) to always run regardless of player count.
min-players: 0

# Optional warning broadcast before cleanup runs.
warning:
  enabled: false
  # How many minutes before the cleanup to send the warning message.
  minutes-before: 5
  # MiniMessage formatted message lives in messages.yml under cleaners.<id>.warning.message.

broadcast:
  start:
    enabled: true
    # MiniMessage formatted message lives in messages.yml under cleaners.<id>.broadcast.start.message.
  summary:
    enabled: true
    # MiniMessage formatted message lives in messages.yml under cleaners.<id>.broadcast.summary.message.
  pre-clean:
    # Optional pre-clean summary shown during the warning phase.
    # Available tags: {minutes}, {cleaner}, {top_worlds}, {top_chunks}
    # MiniMessage formatted message lives in messages.yml under cleaners.<id>.broadcast.pre-clean.message.
  interval:
    enabled: false
    # Broadcast reminder every N minutes. Available tags: {minutes}, {cleaner}
    every-minutes: 15
    # MiniMessage formatted message lives in messages.yml under cleaners.<id>.broadcast.interval.message.
  dynamic:
    enabled: false
    # Extra reminders at specific minute marks before the cleanup.
    minutes: [30, 15, 10, 5]
    # Optional per-second reminders (seconds remaining until cleanup).
    # Use this to broadcast messages at the last few seconds, e.g. [5,4,3,2,1]
    seconds: []
    # MiniMessage formatted message lives in messages.yml under cleaners.<id>.broadcast.dynamic.message.
  stats-summary:
    enabled: false
    # Broadcast a digest every N cleanup runs for this profile.
    every-runs: 5
    # MiniMessage formatted message lives in messages.yml under cleaners.<id>.stats-summary.message.

cancel:
  enabled: true
  # Amount players must pay (using Vault) to cancel the upcoming cleanup.
  cost: 50000.0
  # Hover tooltip shown when players hover the clickable broadcast message. Tags: {cost}, {cleaner}
  # Message configured in messages.yml under cleaners.<id>.cancel.hover-message.
  # Message sent to the player after a successful cancellation. Tags: {cost}, {cleaner}
  # Message configured in messages.yml under cleaners.<id>.cancel.success-message.
  # Broadcast message announcing the cancellation. Tags: {player}, {cost}, {cleaner}, {minutes}
  # Message configured in messages.yml under cleaners.<id>.cancel.broadcast-message.
  # Message shown when the player cannot afford the cancellation. Tags: {cost}, {cleaner}
  # Message configured in messages.yml under cleaners.<id>.cancel.insufficient-funds-message.
  # Message displayed if cancellation is disabled for the cleaner. Tags: {cleaner}
  # Message configured in messages.yml under cleaners.<id>.cancel.disabled-message.
  # Message displayed if Vault or an economy provider is missing. Tags: {cleaner}
  # Message configured in messages.yml under cleaners.<id>.cancel.no-economy-message.

# Set to a list of world names to restrict cleanups. Use "*" to affect all worlds.
# If WorldGuard is installed, regions with the "ezclean-bypass" flag set to ALLOW are skipped.
worlds:
  - "*"

# Automatically culls excessive piles of the same entity type that share a block position.
pile-detection:
  enabled: true
  # Maximum number of tracked entities allowed on a single block before extras are removed.
  max-per-block: 120
  # Entity types that should be monitored for piles. Defaults target drops and experience.
  entity-types:
    - ITEM
    - EXPERIENCE_ORB
  # When enabled, named entities (e.g. armor stands or mobs with display names) are excluded.
  ignore-named-entities: true

# Per-chunk entity caps — removes excess entities when a chunk exceeds the configured
# limit, regardless of how they are distributed within the chunk.
# Unlike pile-detection (same-block stacks), chunk caps prevent lag buildup from
# distributed entity accumulation between cleanup intervals.
# The cap check runs after all protection rules, so tamed/named/proximity-protected
# entities are always exempt.
chunk-caps:
  enabled: false
  # Maximum entities of the tracked categories allowed per chunk (16×256×16 column).
  max-entities-per-chunk: 150
  # Entity categories to count toward the cap.
  # Valid values: HOSTILE_MOBS, PASSIVE_MOBS, DROPPED_ITEMS, EXPERIENCE_ORBS, ALL
  categories:
    - HOSTILE_MOBS
    - PASSIVE_MOBS
  # Entity types exempt from chunk-cap counting (fine-grained override on top of protection rules).
  ignore-types: []
  # When true, entities with a custom name do not count toward the cap.
  ignore-named-entities: true

# Entity / item merging — consolidate nearby identical entities instead of deleting them.
# Merging runs as an early pass inside each cleanup, before the normal removal evaluation.
# Merged-away entities appear in statistics under 'merged-items' and 'merged-orbs' groups.
merging:
  enabled: false
  # Merge nearby dropped items of the same type into a single stack.
  merge-items: true
  # Merge nearby experience orbs into a single orb.
  merge-experience-orbs: true
  # Radius (in blocks) within which two same-type entities are eligible for merging.
  radius-blocks: 3
  # Maximum stack size for merged item stacks.
  # Set to 0 (default) to use each item's vanilla per-material max stack size.
  # Set a positive value to cap stacks at that amount regardless of material.
  max-stack-size: 0

remove:
  hostile-mobs: true
  # Includes farm animals, golems, ambient mobs, and aquatic wildlife.
  passive-mobs: false
  # Covers villagers and wandering traders that extend AbstractVillager.
  villagers: false
  dropped-items: true
  projectiles: true
  experience-orbs: true
  area-effect-clouds: true
  falling-blocks: true
  primed-tnt: true
  # Age-based removal gates.
  # An entity must have been alive for at least this many server ticks before it is
  # eligible for removal.  Set to 0 (default) to remove regardless of age.
  # Useful to let freshly dropped loot or orbs persist briefly before being culled.
  # Reference: 1 tick ≈ 50 ms at 20 TPS  (200 ticks ≈ 10 s, 1200 ticks ≈ 60 s).
  dropped-items-min-age-ticks: 0
  experience-orbs-min-age-ticks: 0

protect:
  players: true
  armor-stands: true
  display-entities: true
  # Prevent removal of mobs that have been tamed by players.
  # WARNING: disabling this while passive-mobs removal is on will delete player pets.
  tamed-mobs: true
  # Skip mobs that have been given a custom name (e.g. via name tags).
  name-tagged-mobs: true
  # Optional regex whitelist for name-tagged-mobs protection.
  # When this list is non-empty only mobs whose custom name matches at least ONE
  # of the patterns (case-insensitive) are protected. Mobs with names that match
  # none of the patterns are treated as unnamed and subject to normal removal rules.
  # Leave empty (default) to protect every named mob — the original behaviour.
  # Example entries:
  #   - "^Guard.*"        # protect any mob named "Guard…"
  #   - "\\[Boss\\]"      # protect mobs with "[Boss]" anywhere in their name
  name-tag-patterns: []

  # Protect specific dropped items from being removed, based on their item metadata.
  # Useful for custom-item plugins (e.g. MMOItems, Oraxen, ItemsAdder) that mark
  # items with custom model data, special lore lines, or PDC keys.
  item-metadata:
    enabled: false
    # Protect items whose custom model data matches one of these integer values.
    # Use '*' as the sole entry to protect ALL items that have any custom model data set.
    custom-model-data: []
    # Protect items whose lore contains any of these strings (case-insensitive substring match).
    # Each entry is checked independently against every lore line of the item.
    lore-contains: []
    # Protect items that carry a persistent data container key matching one of these entries.
    # Format: "namespace:key"  (e.g. "myplugin:bound_item", "oraxen:id")
    pdc-keys: []

  # Player-proximity protection for ground entities.
  # Protect dropped items / experience orbs that are within N blocks of any online player.
  # Set to 0 (default) to disable. Useful to avoid cleaning up loot a player just dropped
  # or orbs they are actively collecting.
  player-proximity:
    dropped-items: 0
    experience-orbs: 0

# Defensive entity-type blacklist.
# The following types are protected by the built-in defensive blacklist and will
# NEVER be removed by category-based rules (hostile-mobs, passive-mobs, etc.).
# You can still force-remove them via entity-types.remove (use with caution).
#   - WITHER
#   - ENDER_DRAGON
#   - WARDEN
#   - ELDER_GUARDIAN

entity-types:
  # Explicit entity types to always keep (overrides any removal rule).
  keep: []
  # Explicit entity types to remove (runs after keep/protect rules).
  remove: []

# Spawn-reason filtering — restrict or bypass entity removal based on how an entity was spawned.
# Spawn reason names correspond to CreatureSpawnEvent.SpawnReason (case-insensitive).
# Common values: NATURAL, SPAWNER, SPAWNER_EGG, BREEDING, CHUNK_GEN, CUSTOM, COMMAND, EGG,
#                DISPENSE_EGG, BUILD_SNOWMAN, VILLAGE_DEFENSE, REINFORCEMENTS, JOCKEY, TRAP
spawn-reasons:
  # Never remove entities with these spawn reasons, regardless of other removal rules.
  # Example: keep spawner-bred mobs safe from the hostile-mobs or passive-mobs sweep.
  restrict: []
  # Always remove entities with these spawn reasons, bypassing tamed / name-tagged protection.
  # The entity still needs to match an enabled category (hostile-mobs, dropped-items, etc.).
  force-remove: []

# Per-world spawn-reason overrides. A world entry REPLACES (does not merge with) the global
# spawn-reasons block for that world. World names are case-insensitive.
# Each world entry also supports:
#   interval-minutes: <N>  — independent cleanup timer for this world (>= 1); the global
#                            timer will skip this world when a per-world interval is set.
#   min-players: <N>       — only clean this world when at least N players are present in it.
# Uncomment and adjust to enable:
# world-overrides:
#   world_nether:
#     interval-minutes: 30
#     min-players: 1
#     spawn-reasons:
#       restrict: []
#       force-remove: []
#   world_nether:
#     spawn-reasons:
#       restrict: [SPAWNER]
#       force-remove: [SPAWNER_EGG]
#   creative_world:
#     spawn-reasons:
#       restrict: [SPAWNER, SPAWNER_EGG, BREEDING]

performance:
  # When true, the behaviour depends on the server platform:
  #   Paper/Spigot — entity scan runs on a background thread; removal is spread across
  #                  multiple server ticks (async-removal-batch-size entities/tick).
  #   Folia        — each entity.remove() is dispatched to the entity's owning region thread,
  #                  so all removals run concurrently across region threads.
  # Disabled by default — safe to enable on large servers.
  # Toggle live with: /ezclean toggle async-removal [id]
  async-removal: false
  # Number of entities removed per tick when async-removal is true (Paper/Spigot only).
  # Lower values spread load across more ticks; higher values finish faster.
  # Has no effect on Folia (all removals are dispatched in a single pass).
  async-removal-batch-size: 500

  # TPS/MSPT-aware scheduling — skip or defer cleanups while the server is under heavy load.
  # Enabled by default ('opt-out' behaviour).  Set enabled: false to disable entirely.
  # When Spark is installed, EzClean automatically uses Spark's higher-quality rolling
  # TPS/MSPT averages instead of the Bukkit reflection fallback.
  tps-aware:
    enabled: true
    # Skip the cleanup run if the 1-minute TPS average falls below this threshold.
    # Full-speed TPS is 20.0; values below ~18 indicate the server is struggling.
    min-tps: 16.0
    # Skip the cleanup run if the average milliseconds-per-tick exceeds this threshold.
    # At 20 TPS a tick takes exactly 50 ms.  Values above 50 ms indicate lag.
    max-mspt: 50.0
    # Maximum number of seconds to keep deferring before forcing a run regardless of load.
    # Prevents indefinite postponement on persistently laggy servers.
    # Set to 0 to defer indefinitely (not recommended).
    max-defer-seconds: 120

  # Spark profiler integration — automatically start a Spark profiler session when a
  # cleanup run removes an unusually large number of entities.  The profiler captures
  # a CPU/entity trace that can be used to identify which plugin or player behaviour is
  # responsible for the buildup.  A shareable report link is printed to the console when
  # the session completes.
  # Requires Spark (https://spark.lucko.me/) to be installed.
  spark:
    auto-profile:
      # Set to true to enable automatic profiling on large cleanup runs.
      enabled: false
      # Minimum entity count that must be scheduled for removal to trigger the profiler.
      # Tune this to a value above your server's normal range so profiling only fires
      # when something is genuinely wrong.
      threshold: 1000
      # How long to run the profiler (seconds).  The profiler stops automatically and
      # uploads a report after this duration.  Minimum: 5 s.
      duration-seconds: 30


# Example: execute in overworld run summon lightning_bolt ~ ~ ~
post-cleanup-commands: []

# Optional integrations with other plugins.
integrations:

  # EzCountdown integration — mirrors each cleanup countdown to EzCountdown's display system.
  # Requires EzCountdown (https://github.com/ez-plugins/EzCountdown) to be installed.
  # When enabled, a DURATION-type countdown is registered in EzCountdown for this cleaner profile
  # and is automatically restarted at the full interval after every cleanup cycle.
  ezcountdown:
    # Set to true to enable the integration for this cleaner.
    enabled: false

    # Name of the EzCountdown countdown entry.
    # Use {cleaner} to include the cleaner profile's ID in the name.
    # Avoid changing this after first enabling the integration to prevent orphaned entries
    # in EzCountdown's storage.
    countdown-name: "ezclean-{cleaner}"

    # EzCountdown display types to use.
    # Available values: ACTION_BAR, BOSS_BAR, CHAT, TITLE, SCOREBOARD
    display-types:
      - ACTION_BAR

    # Format string passed to EzCountdown for countdown display rendering.
    # Refer to EzCountdown's documentation for supported placeholders and MiniMessage formatting.
    format-message: "<yellow>Entity cleanup in <gold><time_left></gold></yellow>"

    # Optional message broadcast by EzCountdown when the countdown starts.
    # Leave blank ("") to disable.
    start-message: ""

    # Optional message broadcast by EzCountdown when the countdown ends.
    # Leave blank ("") to disable.
    end-message: ""

    # Permission node that players must have to see the countdown display.
    # Leave blank ("") to show the countdown to all players.
    visibility-permission: ""

    # How often (in seconds) EzCountdown updates its display.
    # Lower values are smoother but generate more update events.
    update-interval-seconds: 1
